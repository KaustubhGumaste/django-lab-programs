<!DOCTYPE html>
<html>
<head>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

</head>
<body>

<h1>Student Registration (AJAX)</h1>

<form id="form">
{% csrf_token %}
{{ form.as_p }}

<button type="submit">Register</button>
</form>

<div id="msg"></div>

<script>

$("#form").submit(function(e){

e.preventDefault();

$.ajax({
type:"POST",
url:"",
data: $(this).serialize(),

success:function(){

$("#msg").html("Student Registered Successfully");
$("#form")[0].reset();

}

})

})

</script>

</body>
</html>
