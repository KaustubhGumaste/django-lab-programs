<h2>Enroll Student</h2>

<form method="post">
{% csrf_token %}

<select name="student">
{% for s in students %}
<option value="{{s.id}}">
{{s.first_name}} {{s.last_name}}
</option>
{% endfor %}
</select>

<select name="course">
{% for c in courses %}
<option value="{{c.id}}">
{{c.name}}
</option>
{% endfor %}
</select>

<button type="submit">Enroll</button>

</form>
